name: Build_Android_APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build App Project
        run: |
          flutter config --no-analytics
          
          # Quay ra thư mục cha để tạo app hoàn toàn mới, tránh lỗi trùng file
          cd ..
          flutter create --platforms=android ung_dung_loc_mau
          
          cd ung_dung_loc_mau
          
          # Ghi đè mã nguồn bộ lọc mô phỏng vào dự án sạch
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          void main() => runApp(const MaterialApp(home: Scaffold(body: Center(child: Text('He thong loc mau dang hoat dong')))));
          EOF
          
          flutter build apk --release --no-tree-shake-icons
          
          # Chép file thành phẩm ngược lại thư mục gốc để nộp file
          cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/app-release.apk

      - name: Upload Output APK
        uses: actions/upload-artifact@v3
        with:
          name: App_Tai_Ve_Dien_Thoai
          path: app-release.apk
