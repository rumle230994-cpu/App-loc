name: Build_APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: |
          flutter create --platforms=android app_filter
          cd app_filter
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          void main() => runApp(const MaterialApp(home: Scaffold(body: Center(child: Text('App Filter Running')))));
          EOF
          flutter build apk --profile

      - uses: actions/upload-artifact@v3
        with:
          name: App_Output
          path: app_filter/build/app/outputs/flutter-apk/app-profile.apk
