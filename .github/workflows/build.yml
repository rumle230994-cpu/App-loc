name: Build_Android_APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build App Project
        run: |
          # Tự động đồng bộ cấu hình Android SDK nội bộ của máy chủ
          flutter config --no-analytics
          
          # Khởi tạo dự án độc lập với cấu hình Android bắt buộc
          flutter create --template=app --platforms=android .
          
          # Ghi đè mã nguồn bộ lọc vào cấu hình hệ thống
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          void main() => runApp(const MaterialApp(home: Scaffold(body: Center(child: Text('App Filter System Running')))));
          EOF
          
          # Thực hiện biên dịch trực tiếp ra file cài đặt APK thông thường
          flutter build apk --release --no-tree-shake-icons

      - name: Upload Output APK
        uses: actions/upload-artifact@v3
        with:
          name: App_Loc_Mau_Kha_Dung
          path: build/app/outputs/flutter-apk/app-release.apk
