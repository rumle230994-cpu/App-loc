name: Build_Android_APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Create Webview App
        run: |
          # 1. Cài đặt công cụ đóng gói siêu tốc Cordova
          npm install -g cordova
          
          # 2. Tạo một phôi ứng dụng Android thuần túy cực nhẹ
          cordova create app_loc_mau com.locmau.app AppLocMau
          cd app_loc_mau
          cordova platform add android --no-telemetry
          
          # 3. Ghi đè mã nguồn camera và bộ lọc màu trực tiếp vào app
          cat << 'EOF' > www/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
              <title>Hệ Thống Lọc Màu Video</title>
              <style>
                  body { margin: 0; padding: 0; background: #111; font-family: sans-serif; overflow: hidden; color: #fff; }
                  #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
                  video { position: absolute; width: 100%; height: 100%; object-fit: cover; }
                  canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }
                  .control-panel { position: absolute; bottom: 30px; left: 5%; width: 90%; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; box-sizing: border-box; text-align: center; }
                  .title { font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #ff3b30; }
                  .sub { font-size: 11px; color: #aaa; }
              </style>
          </head>
          <body>
              <div id="container">
                  <video id="video" autoplay playsinline muted></video>
                  <canvas id="canvas"></canvas>
                  <div class="control-panel">
                      <div class="title">HỆ THỐNG PHÂN TÍCH MÀU VIDEO LIVE</div>
                      <div class="sub">Đang giữ Đen & Đỏ - Loại bỏ Xanh lá (Nhìn Xuyên)</div>
                  </div>
              </div>
              <script>
                  const video = document.getElementById('video');
                  const canvas = document.getElementById('canvas');
                  const ctx = canvas.getContext('2d');

                  // Gọi camera điện thoại
                  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
                      .then(stream => { video.srcObject = stream; })
                      .catch(err => alert("Lỗi truy cập camera: " + err));

                  video.addEventListener('play', () => {
                      function step() {
                          if (video.paused || video.ended) return;
                          if (canvas.width !== video.videoWidth) {
                              canvas.width = video.videoWidth;
                              canvas.height = video.videoHeight;
                          }
                          // Vẽ khung hình từ camera lên canvas tạm
                          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                          
                          // Lấy dữ liệu từng điểm ảnh (Pixel) để lọc màu
                          let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                          let data = imgData.data;

                          for (let i = 0; i < data.length; i += 4) {
                              let r = data[i];
                              let g = data[i+1];
                              let b = data[i+2];

                              // Thuật toán: Nhận diện màu xanh lá (Green trội hơn hẳn)
                              if (g > 70 && g > r * 1.1 && g > b * 1.1) {
                                  // Chuyển pixel màu xanh đó thành màu xám/trắng mờ (Nhìn xuyên qua)
                                  let grayscale = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                                  data[i] = grayscale + 40;     // Tăng sáng R
                                  data[i+1] = grayscale + 40;   // Tăng sáng G
                                  data[i+2] = grayscale + 40;   // Tăng sáng B
                              }
                              // Giữ nguyên các pixel màu Đỏ (R cao) và màu Đen (Cả 3 đều thấp)
                          }
                          ctx.putImageData(imgData, 0, 0);
                          requestAnimationFrame(step);
                      }
                      requestAnimationFrame(step);
                  });
              </script>
          </body>
          </html>
          EOF
          
          # 4. Biên dịch thẳng ra file APK thuần túy
          cordova build android --release
          
          # 5. Đưa file thành phẩm ra ngoài để tải
          cp platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk $GITHUB_WORKSPACE/App_Loc_Mau.apk

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: App_Kha_Dung_Cai_May
          path: App_Loc_Mau.apk
