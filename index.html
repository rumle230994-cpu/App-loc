<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Phân Tích Màu Live</title>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: -apple-system, sans-serif; overflow: hidden; color: #fff; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        .control-panel { position: absolute; bottom: 40px; left: 5%; width: 90%; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 16px; box-sizing: border-box; text-align: center; border: 1px solid #333; }
        .title { font-weight: bold; font-size: 15px; margin-bottom: 4px; color: #ff3b30; letter-spacing: 1px; }
        .sub { font-size: 12px; color: #00ff00; }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <div class="control-panel">
            <div class="title">HỆ THỐNG PHÂN TÍCH MÀU VIDEO LIVE</div>
            <div class="sub">Đang giữ Đen & Đỏ - Khử màu Xanh lá (Nhìn Xuyên)</div>
        </div>
    </div>
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // Kích hoạt camera sau của điện thoại
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } }, 
            audio: false 
        })
        .then(stream => { 
            video.srcObject = stream; 
        })
        .catch(err => alert("Vui lòng cấp quyền mở Camera cho trình duyệt: " + err));

        video.addEventListener('play', () => {
            function processFrame() {
                if (video.paused || video.ended) return;
                if (canvas.width !== video.videoWidth) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                }
                
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                let data = imgData.data;

                // Vòng lặp quét từng Pixel thời gian thực để loại bỏ màu xanh
                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i];
                    let g = data[i+1];
                    let b = data[i+2];

                    // Thuật toán nhận diện màu xanh lá (Green trội hơn hẳn đỏ và xanh dương)
                    if (g > 65 && g > r * 1.1 && g > b * 1.1) {
                        // Khử màu xanh lá bằng cách biến vùng đó thành màu xám/trắng nhạt để nhìn xuyên qua
                        let gray = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                        data[i] = gray + 50;     
                        data[i+1] = gray + 50;   
                        data[i+2] = gray + 50;   
                    }
                    // Các vùng màu Đỏ và Đen được giữ nguyên sắc độ để hiển thị rõ lên màn hình
                }
                ctx.putImageData(imgData, 0, 0);
                requestAnimationFrame(processFrame);
            }
            requestAnimationFrame(processFrame);
        });
    </script>
</body>
</html>
